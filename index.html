<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Thelmas gangetabell</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Thelmas ×">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Segoe UI', Rounded, Arial, sans-serif;
      background: linear-gradient(160deg, #7c3aed 0%, #db2777 100%);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* ── SCREENS ── */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 420px;
      animation: fadeIn 0.3s ease;
    }
    .screen.active { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── CARD ── */
    .card {
      background: rgba(255,255,255,0.97);
      border-radius: 24px;
      padding: 32px 24px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.25);
      text-align: center;
    }

    /* ── HOME ── */
    .thelma-photo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center 15%;
      border: 4px solid #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      margin-bottom: 14px;
    }
    .home-emoji { font-size: 72px; margin-bottom: 12px; }
    .home-title {
      font-size: 28px;
      font-weight: 900;
      color: #5b21b6;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .home-sub {
      font-size: 15px;
      color: #9333ea;
      margin-bottom: 32px;
    }

    /* ── SELECT ── */
    .select-title {
      font-size: 20px;
      font-weight: 800;
      color: #5b21b6;
      margin-bottom: 20px;
    }
    .select-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 8px;
    }
    .select-btn {
      background: linear-gradient(135deg, #7c3aed, #db2777);
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 22px 10px;
      font-size: 26px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 4px 14px rgba(124,58,237,0.35);
    }
    .select-btn:active { transform: scale(0.95); box-shadow: none; }
    .select-btn span {
      display: block;
      font-size: 13px;
      font-weight: 600;
      opacity: 0.85;
      margin-top: 2px;
    }

    /* ── GAME ── */
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      width: 100%;
    }
    .progress-text {
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
    }
    .score-text {
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
    }

    /* Timer ring */
    .timer-wrap {
      position: relative;
      width: 72px;
      height: 72px;
      flex-shrink: 0;
    }
    .timer-ring { transform: rotate(-90deg); }
    .timer-ring-bg {
      fill: none;
      stroke: rgba(255,255,255,0.2);
      stroke-width: 5;
    }
    .timer-ring-progress {
      fill: none;
      stroke: #fbbf24;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-dasharray: 188.5;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke 0.3s;
    }
    .timer-number {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 900;
      color: #fff;
    }

    /* Question */
    .question-label {
      font-size: 13px;
      font-weight: 600;
      color: #9333ea;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .question-text {
      font-size: 42px;
      font-weight: 900;
      color: #1e1b4b;
      margin-bottom: 24px;
      letter-spacing: -1px;
    }

    /* Answer buttons */
    .answers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .answer-btn {
      background: #f5f3ff;
      border: 3px solid #e9d5ff;
      border-radius: 16px;
      padding: 20px 8px;
      font-size: 28px;
      font-weight: 900;
      color: #5b21b6;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s, border-color 0.2s;
    }
    .answer-btn:not(:disabled):active { transform: scale(0.95); }
    .answer-btn.correct {
      background: #d1fae5;
      border-color: #34d399;
      color: #065f46;
    }
    .answer-btn.wrong {
      background: #fee2e2;
      border-color: #f87171;
      color: #991b1b;
    }
    .answer-btn.reveal {
      background: #d1fae5;
      border-color: #34d399;
      color: #065f46;
    }
    .answer-btn:disabled { cursor: default; }

    /* Feedback */
    .feedback {
      margin-top: 16px;
      font-size: 18px;
      font-weight: 800;
      min-height: 28px;
      transition: opacity 0.2s;
    }
    .feedback.correct { color: #059669; }
    .feedback.wrong   { color: #dc2626; }
    .feedback.timeout { color: #d97706; }

    /* Progress bar */
    .progress-bar-wrap {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.2);
      border-radius: 99px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #fbbf24;
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* ── RESULT ── */
    .result-emoji { font-size: 64px; margin-bottom: 8px; }
    .result-title {
      font-size: 26px;
      font-weight: 900;
      color: #5b21b6;
      margin-bottom: 4px;
    }
    .result-score {
      font-size: 16px;
      color: #7c3aed;
      margin-bottom: 24px;
    }

    /* Stars */
    .stars {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .star {
      font-size: 52px;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      transform: scale(0);
      filter: grayscale(1);
      opacity: 0.3;
    }
    .star.earned {
      filter: none;
      opacity: 1;
      transform: scale(1);
    }
    .star.earned:nth-child(1) { transition-delay: 0.1s; }
    .star.earned:nth-child(2) { transition-delay: 0.4s; }
    .star.earned:nth-child(3) { transition-delay: 0.7s; }

    .result-msg {
      font-size: 16px;
      color: #6b7280;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* ── BUTTONS ── */
    .btn-primary {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 18px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(124,58,237,0.4);
      transition: transform 0.1s, box-shadow 0.1s;
      margin-bottom: 12px;
    }
    .btn-primary:active { transform: scale(0.97); box-shadow: none; }

    .btn-secondary {
      display: block;
      width: 100%;
      background: transparent;
      color: #7c3aed;
      border: 2.5px solid #c4b5fd;
      border-radius: 16px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-secondary:active { background: #f5f3ff; }

    /* Confetti */
    .confetti-wrap {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 999;
    }
    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

<!-- ── HOME ── -->
<div id="screen-home" class="screen active">
  <div class="card">
    <img src="thelma.jpg" alt="Thelma" class="thelma-photo">
    <div class="home-title">Thelmas<br>gangetabell</div>
    <div class="home-sub">Øv på 1–10 tabellen!</div>
    <button class="btn-primary" onclick="showSelect()">La oss starte! 🚀</button>
  </div>
</div>

<!-- ── SELECT ── -->
<div id="screen-select" class="screen">
  <div class="card">
    <div class="select-title">Hvor mange spørsmål?</div>
    <div class="select-grid">
      <button class="select-btn" onclick="startGame(10)">10<span>spørsmål</span></button>
      <button class="select-btn" onclick="startGame(15)">15<span>spørsmål</span></button>
      <button class="select-btn" onclick="startGame(20)">20<span>spørsmål</span></button>
      <button class="select-btn" onclick="startGame(25)">25<span>spørsmål</span></button>
    </div>
  </div>
</div>

<!-- ── GAME ── -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <div class="progress-text" id="progress-text">Spørsmål 1 av 10</div>
    <div class="timer-wrap">
      <svg class="timer-ring" width="72" height="72" viewBox="0 0 72 72">
        <circle class="timer-ring-bg" cx="36" cy="36" r="30"/>
        <circle class="timer-ring-progress" id="timer-ring" cx="36" cy="36" r="30"/>
      </svg>
      <div class="timer-number" id="timer-number">5</div>
    </div>
    <div class="score-text" id="score-text">✅ 0</div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
  </div>

  <div class="card">
    <div class="question-label">Hva er…</div>
    <div class="question-text" id="question-text">5 × 6 = ?</div>
    <div class="answers" id="answers"></div>
    <div class="feedback" id="feedback"></div>
  </div>
</div>

<!-- ── RESULT ── -->
<div id="screen-result" class="screen">
  <div class="card">
    <div class="result-emoji" id="result-emoji">🎉</div>
    <div class="result-title" id="result-title">Bra jobba!</div>
    <div class="result-score" id="result-score">Du fikk 8 av 10 riktige!</div>
    <div class="stars">
      <div class="star" id="star1">⭐</div>
      <div class="star" id="star2">⭐</div>
      <div class="star" id="star3">⭐</div>
    </div>
    <div class="result-msg" id="result-msg"></div>
    <button class="btn-primary" onclick="showSelect()">Prøv igjen 🔁</button>
    <button class="btn-secondary" onclick="showHome()">Hjem 🏠</button>
  </div>
</div>

<div class="confetti-wrap" id="confetti"></div>

<script>
  // ── STATE ──
  let questions = [];
  let currentIdx = 0;
  let score = 0;
  let total = 10;
  let timerInterval = null;
  let timeLeft = 5;
  let answered = false;

  const CIRCUMFERENCE = 2 * Math.PI * 30; // r=30 → 188.5

  // ── NAVIGATION ──
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
  function showHome()   { showScreen('screen-home'); }
  function showSelect() { showScreen('screen-select'); }

  // ── QUESTION GENERATION ──
  function generateQuestions(count) {
    const qs = [];
    for (let i = 0; i < count; i++) {
      const a = rand(1, 10);
      const b = rand(1, 10);
      const correct = a * b;
      const wrongs = generateWrongAnswers(correct, a, b);
      const options = shuffle([correct, ...wrongs]);
      qs.push({ a, b, correct, options });
    }
    return qs;
  }

  function generateWrongAnswers(correct, a, b) {
    const wrongs = new Set();
    let tries = 0;
    while (wrongs.size < 3 && tries < 80) {
      tries++;
      let w;
      const r = Math.random();
      if (r < 0.35) {
        // Offset from correct
        const offset = rand(1, 5) * (Math.random() < 0.5 ? 1 : -1);
        w = correct + offset;
      } else if (r < 0.65) {
        // Swap one factor by ±1
        const altA = clamp(a + (Math.random() < 0.5 ? 1 : -1), 1, 10);
        w = altA * b;
      } else {
        const altB = clamp(b + (Math.random() < 0.5 ? 1 : -1), 1, 10);
        w = a * altB;
      }
      if (w > 0 && w <= 100 && w !== correct) wrongs.add(w);
    }
    // Safety fill
    const pool = [correct - 2, correct + 2, correct - 3, correct + 3,
                  correct - 5, correct + 5, correct - 1, correct + 1];
    for (const v of pool) {
      if (wrongs.size >= 3) break;
      if (v > 0 && v <= 100 && v !== correct) wrongs.add(v);
    }
    return [...wrongs].slice(0, 3);
  }

  function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }
  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ── GAME START ──
  function startGame(count) {
    total = count;
    score = 0;
    currentIdx = 0;
    questions = generateQuestions(count);
    showScreen('screen-game');
    showQuestion();
  }

  // ── SHOW QUESTION ──
  function showQuestion() {
    answered = false;
    const q = questions[currentIdx];
    timeLeft = 10;

    // Header
    document.getElementById('progress-text').textContent =
      `Spørsmål ${currentIdx + 1} av ${total}`;
    document.getElementById('score-text').textContent = `✅ ${score}`;

    // Progress bar
    const pct = (currentIdx / total) * 100;
    document.getElementById('progress-bar').style.width = pct + '%';

    // Question
    document.getElementById('question-text').textContent =
      `${q.a} × ${q.b} = ?`;

    // Answers
    const answersEl = document.getElementById('answers');
    answersEl.innerHTML = '';
    q.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'answer-btn';
      btn.textContent = opt;
      btn.onclick = () => selectAnswer(opt, q.correct);
      answersEl.appendChild(btn);
    });

    // Feedback
    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = 'feedback';

    // Timer
    startTimer(q.correct);
  }

  // ── TIMER ──
  function startTimer(correct) {
    clearInterval(timerInterval);
    updateTimerUI(5);

    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimerUI(timeLeft);
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        if (!answered) timeOut(correct);
      }
    }, 1000);
  }

  function updateTimerUI(t) {
    const ring = document.getElementById('timer-ring');
    const num  = document.getElementById('timer-number');
    const offset = CIRCUMFERENCE * (1 - t / 10);
    ring.style.strokeDashoffset = offset;
    ring.style.stroke = t <= 3 ? '#ef4444' : '#fbbf24';
    num.textContent = t;
  }

  // ── ANSWER SELECTION ──
  function selectAnswer(chosen, correct) {
    if (answered) return;
    answered = true;
    clearInterval(timerInterval);

    const buttons = document.querySelectorAll('.answer-btn');
    const fb = document.getElementById('feedback');

    buttons.forEach(btn => {
      btn.disabled = true;
      const val = parseInt(btn.textContent);
      if (val === correct) btn.classList.add('correct');
      if (val === chosen && chosen !== correct) btn.classList.add('wrong');
    });

    if (chosen === correct) {
      score++;
      fb.textContent = '🎉 Riktig!';
      fb.className = 'feedback correct';
    } else {
      fb.textContent = `😬 Riktig svar var ${correct}`;
      fb.className = 'feedback wrong';
    }

    setTimeout(nextQuestion, 1200);
  }

  function timeOut(correct) {
    answered = true;
    const buttons = document.querySelectorAll('.answer-btn');
    const fb = document.getElementById('feedback');
    buttons.forEach(btn => {
      btn.disabled = true;
      if (parseInt(btn.textContent) === correct) btn.classList.add('reveal');
    });
    fb.textContent = `⏰ Tiden gikk ut! Svaret var ${correct}`;
    fb.className = 'feedback timeout';
    setTimeout(nextQuestion, 1400);
  }

  function nextQuestion() {
    currentIdx++;
    if (currentIdx < total) {
      showQuestion();
    } else {
      showResult();
    }
  }

  // ── RESULT ──
  function showResult() {
    showScreen('screen-result');

    const pct = score / total;
    let stars = 0;
    if (pct >= 1.0)  stars = 3;
    else if (pct >= 0.85) stars = 2;
    else if (pct >= 0.70) stars = 1;

    // Score text
    document.getElementById('result-score').textContent =
      `Du fikk ${score} av ${total} riktige!`;

    // Emoji + title + message
    const configs = [
      { emoji: '💪', title: 'Øv litt mer!',   msg: 'Du klarer det! Prøv igjen og se om du kan få flere riktige. 🌈' },
      { emoji: '😊', title: 'Bra jobba!',      msg: 'Du er på god vei! Litt mer øving og du er ekspert. 📚' },
      { emoji: '🥳', title: 'Nesten perfekt!', msg: 'Kjempebra! Du er veldig flink! Klarer du 3 stjerner neste gang? ✨' },
      { emoji: '🏆', title: 'Perfekt!',        msg: 'WOW! Du fikk alt riktig! Du er en gangetabell-stjerne! 🌟🌟🌟' },
    ];
    const cfg = configs[stars];
    document.getElementById('result-emoji').textContent = cfg.emoji;
    document.getElementById('result-title').textContent = cfg.title;
    document.getElementById('result-msg').textContent   = cfg.msg;

    // Reset stars
    ['star1','star2','star3'].forEach(id => {
      document.getElementById(id).classList.remove('earned');
    });

    // Animate stars in
    setTimeout(() => {
      for (let i = 1; i <= stars; i++) {
        document.getElementById(`star${i}`).classList.add('earned');
      }
      if (stars === 3) launchConfetti();
    }, 200);
  }

  // ── CONFETTI ──
  function launchConfetti() {
    const wrap = document.getElementById('confetti');
    wrap.innerHTML = '';
    const colors = ['#7c3aed','#db2777','#fbbf24','#34d399','#60a5fa','#f87171'];
    for (let i = 0; i < 80; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top  = '-10px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.width  = (Math.random() * 8 + 6) + 'px';
      el.style.height = (Math.random() * 8 + 6) + 'px';
      el.style.animationDuration = (Math.random() * 2 + 2) + 's';
      el.style.animationDelay   = (Math.random() * 1.5) + 's';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      wrap.appendChild(el);
    }
    setTimeout(() => { wrap.innerHTML = ''; }, 5000);
  }

  // ── SERVICE WORKER ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
